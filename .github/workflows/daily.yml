name: Daily Telegram Message

on:
  # Runs every day at 08:00 Israel time (06:00 UTC, UTC+2 in winter / UTC+3 in summer)
  # Adjust the hour if needed for daylight saving time.
  schedule:
    - cron: '0 6 * * *'

  # Allows manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    environment: bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent/main.py
